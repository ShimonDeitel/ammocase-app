name: Ammocase
options:
  bundleIdPrefix: com.shimondeitel.ammocase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  Ammocase:
    type: application
    platform: iOS
    sources:
      - path: Ammocase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ammocase
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: Ammocase/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  AmmocaseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: AmmocaseTests
      - path: Ammocase.storekit
    dependencies:
      - target: Ammocase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ammocase.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  AmmocaseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: AmmocaseUITests
    dependencies:
      - target: Ammocase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.ammocase.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  Ammocase:
    build:
      targets:
        Ammocase: all
        AmmocaseTests: [test]
        AmmocaseUITests: [test]
    test:
      targets:
        - AmmocaseTests
        - AmmocaseUITests
